<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urban Street - Login</title>
  <link href="./output.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body class="min-h-screen flex items-start justify-center bg-gradient-to-br 
from-zinc-900 via-black to-zinc-800 px-4 py-5">
  <div class="w-full max-w-5xl grid md:grid-cols-2 bg-zinc-900 border border-zinc-700 rounded-2xl 
  overflow-hidden shadow-2xl">
    <div class="relative hidden md:block">
      <img src="./images/back-1.jpg" alt="back-1" class="w-full h-full object-cover opacity-80"/>

      <div class="absolute inset-0 bg-black/30"></div>

      <div class="absolute bottom-8 left-8 text-white">
        <h1 class="text-3xl font-bold tracking-wide">URBAN STREET</h1>
        <p class="text-sm text-gray-300 mt-2"> Streetwear for the bold. Minimal. Clean. Powerful.</p>
      </div>
    </div>

    <div class="p-6 sm:p-10 bg-[#0b0b0b] text-white">

      <div class="mb-8">
        <h2 class="text-3xl font-bold">Sign In</h2>
        <p class="text-gray-400 text-sm mt-1">Access your Urban Street account</p>
      </div>

      <form class="space-y-5">
        <div>
          <label class="text-sm text-zinc-400">Email</label>
          <input type="email" placeholder="you@urbanstreet.com" class="w-full mt-2 px-4 py-3 
          rounded-xl bg-zinc-800 border border-zinc-600 focus:outline-none focus:border-white 
          focus:ring-2 focus:ring-white/10 transition"/>
        </div>

        <div>
  <label class="text-sm text-zinc-400">Password</label>

  <div class="relative mt-2">
    
    <input id="togglePassword" type="checkbox" class="peer hidden"/>

    <input type="text" placeholder="••••••••" class="w-full px-4 py-3 pr-12 rounded-xl 
    bg-zinc-800 border border-zinc-600 focus:outline-none focus:border-white focus:ring-2 
    focus:ring-white/10 transition"/>

    </label>

  </div>
</div>

        <div class="flex items-center justify-between text-sm text-gray-400">
          <label class="flex items-center gap-2">
            <input type="checkbox" class="accent-white">Remember me
          </label>

          <a href="#" class="hover:text-white transition">Forgot password?</a>
        </div>

        <button
          type="submit"
          class="w-full bg-white text-black font-semibold py-3 rounded-xl
                 hover:bg-gray-400 transition">Login</button>
      </form>

      <div class="flex items-center my-6">
        <div class="flex-1 h-px bg-gray-800"></div>
        <span class="px-3 text-xs text-gray-500">OR</span>
        <div class="flex-1 h-px bg-gray-800"></div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <button class="border border-gray-700 rounded-xl py-3 text-sm hover:bg-white 
        hover:text-black transition">Google</button>

        <button class="border border-gray-700 rounded-xl py-3 text-sm hover:bg-white 
        hover:text-black transition">Apple</button>
      </div>

      <p class="text-center text-sm text-gray-500 mt-6">Don’t have an account?
        <a href="Register.html" class="text-white hover:underline font-medium">Create one</a>
      </p>

    </div>
  </div>

</body>
</html>
